spring:
  application:
    name: sathishlogger
  docker:
    compose:
      enabled: false
      start:
        skip: if_running
      lifecycle-management: none

# Common defaults - environment-specific configs loaded from config server
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
