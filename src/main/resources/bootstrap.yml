spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: sathishlogger
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    config:
      enabled: true
      uri: ${CONFIG_SERVER_URL}
      username: ${SPRING_CLOUD_CONFIG_USERNAME}
      password: ${SPRING_CLOUD_CONFIG_PASSWORD}
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 2000
        max-interval: 5000
        multiplier: 1.5
